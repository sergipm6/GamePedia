<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login — GamePedia</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<div th:replace="~{/templateFragments/navLogin :: menuLogin}"></div>

<div class="container mt-5 d-flex justify-content-center">
    <div class="card shadow-sm p-4" style="width: 100%; max-width: 420px;">

        <div th:if="${param.registered}" class="alert alert-success">
            Usuario registrado correctamente. Inicia sesión.
        </div>
        <div th:if="${param.error}" class="alert alert-danger">
            Usuario o contraseña incorrectos.
        </div>
        <div th:if="${param.userExists}" class="alert alert-danger">
            Ese nombre de usuario ya está en uso.
        </div>

        <div class="text-center mb-3">
            <i class="bi bi-person-circle fs-1 text-primary"></i>
        </div>
        <h5 class="text-center mb-4">Accede a GamePedia</h5>

        <ul class="nav nav-tabs mb-4">
            <li class="nav-item w-50 text-center">
                <a class="nav-link active" data-bs-toggle="tab" href="#login">Iniciar sesión</a>
            </li>
            <li class="nav-item w-50 text-center">
                <a class="nav-link" data-bs-toggle="tab" href="#register">Registrarse</a>
            </li>
        </ul>

        <div class="tab-content">

            <!-- LOGIN -->
            <div class="tab-pane fade show active" id="login">
                <form th:action="@{/login}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Usuario</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-0 text-white">
                                <i class="bi bi-person"></i>
                            </span>
                            <input type="text" name="username" class="form-control border-0 shadow-none"
                                   placeholder="Introduce tu usuario" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-0 text-white">
                                <i class="bi bi-lock"></i>
                            </span>
                            <input type="password" name="password" class="form-control border-0 shadow-none"
                                   placeholder="Introduce tu contraseña" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Entrar</button>
                </form>
            </div>

            <!-- REGISTRO -->
            <div class="tab-pane fade" id="register">
                <form th:action="@{/login/register}" method="post">
                    <div class="mb-3">
                        <label class="form-label">Usuario</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-0 text-white">
                                <i class="bi bi-person-plus"></i>
                            </span>
                            <input type="text" name="username" class="form-control border-0 shadow-none"
                                   placeholder="Elige un nombre de usuario" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Email</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-0 text-white">
                                <i class="bi bi-envelope"></i>
                            </span>
                            <!-- ✅ Campo email añadido, obligatorio en tu entidad -->
                            <input type="email" name="email" class="form-control border-0 shadow-none"
                                   placeholder="Introduce tu email" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Contraseña</label>
                        <div class="input-group">
                            <span class="input-group-text bg-dark border-0 text-white">
                                <i class="bi bi-lock"></i>
                            </span>
                            <input type="password" name="password" class="form-control border-0 shadow-none"
                                   placeholder="Elige una contraseña" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Registrarse</button>
                </form>
            </div>

        </div>
    </div>
</div>
<div th:replace="~{/templateFragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
