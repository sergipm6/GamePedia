<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="menuComun"
     xmlns:sec="http://www.thymeleaf.org/extras/spring-security">  <!-- ✅ aquí -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" th:href="@{/styles.css}">

  <nav class="navbar">
    <div class="container-fluid">
      <a class="navbar-brand" th:href="@{/}">
        <i class="bi bi-controller"></i> GamePedia
      </a>

      <div class="navbar-collapse">
        <ul class="navbar-nav">

          <li class="nav-item">
            <a class="nav-link" th:href="@{/games}">
              <i class="bi bi-joystick me-1"></i>Juegos
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" th:href="@{/leagues}">
              <i class="bi bi-joystick me-1"></i>Competiciones
            </a>
          </li>

          <li class="nav-item">
            <a class="nav-link" th:href="@{/teams}">
              <i class="bi bi-joystick me-1"></i>Equipos
            </a>
          </li>


          <li class="nav-item" sec:authorize="isAnonymous()">
            <a class="nav-link" th:href="@{/login}">
              <i class="bi bi-person-circle me-1"></i>Login
            </a>
          </li>

          <li class="nav-item" sec:authorize="hasRole('ADMIN')">
            <a class="nav-link" th:href="@{/admin}">
              <i class="bi bi-speedometer2 me-1"></i>Dashboard
            </a>
          </li>

          <li class="nav-item" sec:authorize="isAuthenticated()">
            <form th:action="@{/logout}" method="post" style="display:inline">
              <button type="submit" class="nav-link btn btn-link">
                <i class="bi bi-box-arrow-right me-1"></i>Logout
              </button>
            </form>
          </li>

        </ul>
      </div>
    </div>
  </nav>
</div>

</body>
</html>
