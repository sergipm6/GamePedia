<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formulario de Liga | GamePedia</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<div th:replace="~{templateFragments/navBar :: menuComun}"></div>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow">
                <div class="card-header">
                    <i class="bi bi-trophy-fill me-2"></i>Configurar Liga
                </div>
                <div class="card-body p-4">
                    <form th:action="@{/admin/saveLeague}" th:object="${league}" method="post">

                        <input type="hidden" th:field="*{leagueId}">

                        <div class="row g-3">

                            <!-- Nombre -->
                            <div class="col-12">
                                <label class="form-label">Nombre de la Liga</label>
                                <input type="text" th:field="*{leagueName}" class="form-control"
                                       placeholder="Ej: Worlds 2026, LEC, LVP..." required>
                            </div>

                            <!-- Juego -->
                            <div class="col-12">
                                <label class="form-label">Juego</label>
                                <select th:field="*{game}" class="form-select" required>
                                    <option value="">— Selecciona un juego —</option>
                                    <option th:each="g : ${games}"
                                            th:value="${g.gameId}"
                                            th:text="${g.gameName}">
                                    </option>
                                </select>
                            </div>

                            <!-- URL Imagen -->
                            <div class="col-12">
                                <label class="form-label">URL del Logo / Banner</label>
                                <input type="url" th:field="*{imageUrl}" class="form-control"
                                       placeholder="https://ejemplo.com/logo-liga.png">
                                <!-- Preview -->
                                <div th:if="${league.imageUrl != null && !league.imageUrl.isEmpty()}"
                                     class="mt-2 text-center">
                                    <img th:src="${league.imageUrl}" alt="Preview"
                                         style="max-height:80px; object-fit:contain; border-radius:8px;">
                                </div>
                            </div>

                            <!-- Internacional -->
                            <div class="col-12 d-flex align-items-center" style="padding-top:0.5rem;">
                                <div class="form-check">
                                    <input class="form-check-input" type="checkbox"
                                           th:field="*{international}" id="intCheck">
                                    <label class="form-check-label" for="intCheck">
                                        Torneo Internacional / Major
                                    </label>
                                </div>
                            </div>

                            <!-- Descripción -->
                            <div class="col-12">
                                <label class="form-label">Descripción</label>
                                <textarea th:field="*{leagueDescription}" class="form-control" rows="4"
                                          placeholder="Describe la liga, su formato, historia..."></textarea>
                            </div>

                        </div>

                        <div class="d-flex justify-content-end mt-4" style="gap:0.75rem;">
                            <a th:href="@{/admin}" class="btn btn-outline-secondary rounded-pill px-4">
                                Cancelar
                            </a>
                            <button type="submit" class="btn btn-primary rounded-pill px-4 fw-bold">
                                <i class="bi bi-floppy me-1"></i>Guardar Liga
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{templateFragments/footer :: footer}"></div>
</body>
</html>
