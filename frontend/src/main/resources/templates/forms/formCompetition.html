<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formulario de Liga | GamePedia</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<div th:replace="~{templateFragments/navBar :: menuComun}"></div>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <h1 class="mb-4">
                <i class="bi bi-trophy-fill me-2 text-primary"></i>Configurar Liga
            </h1>

            <div class="card shadow p-4">
                <form th:action="@{/leagues/save}" th:object="${league}" method="post">

                    <input type="hidden" th:field="*{leagueId}">

                    <div class="mb-4">
                        <label class="form-label">Nombre de la Liga</label>
                        <input type="text" th:field="*{leagueName}" class="form-control"
                               placeholder="Ej: Worlds 2026, LEC, LVP..." required>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Descripción</label>
                        <textarea th:field="*{leagueDescription}" class="form-control" rows="3"></textarea>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Juego</label>
                        <select th:field="*{game}" class="form-select" required>
                            <option value="" disabled selected>Selecciona un juego...</option>
                            <option th:each="g : ${games}" th:value="${g.gameId}" th:text="${g.gameName}"></option>
                        </select>
                    </div>

                    <div class="mb-4 form-check">
                        <input class="form-check-input" type="checkbox" th:field="*{international}" id="intCheck">
                        <label class="form-check-label" for="intCheck">
                            ¿Es un torneo Internacional / Major?
                        </label>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-floppy me-1"></i>Guardar Liga
                        </button>
                        <a th:href="@{/league}" class="btn btn-outline-secondary">Cancelar</a>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>

</body>
</html>
