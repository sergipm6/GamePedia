<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Formulario de Liga | eSports Manager</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{templateFragments/navBar :: menuComun}"></div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <h1 class="mb-4">Configurar Liga</h1>

            <form th:action="@{/leagues/save}" th:object="${league}" method="post" class="card p-4 shadow-sm">

                <input type="hidden" th:field="*{leagueId}">

                <div class="mb-3">
                    <label class="form-label fw-bold">Nombre de la Liga</label>
                    <input type="text" th:field="*{leagueName}" class="form-control" placeholder="Ej: Worlds 2026, LEC, LVP..." required/>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Descripción</label>
                    <textarea th:field="*{leagueDescription}" class="form-control" rows="2"></textarea>
                </div>

                <div class="mb-3">
                    <label class="form-label fw-bold">Juego</label>
                    <select th:field="*{game}" class="form-select" required>
                        <option value="" disabled selected>Selecciona un juego...</option>
                        <option th:each="g : ${games}" th:value="${g.gameId}" th:text="${g.gameName}"></option>
                    </select>
                </div>

                <div class="mb-4 form-check form-switch">
                    <input class="form-check-input" type="checkbox" th:field="*{international}" id="intCheck">
                    <label class="form-check-label fw-bold" for="intCheck">
                        ¿Es un torneo Internacional / Major?
                    </label>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary">Guardar Liga</button>
                    <a th:href="@{/league}" class="btn btn-outline-secondary">Cancelar</a>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
