<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Formulario de jugadores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="/style.css" />
</head>
</head>
<body>
<div th:replace="~{/templateFragments/navBar :: menuComun}"></div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6"><h1 class="mb-4">Añadir jugadores</h1>

<form th:action="@{/add/players}" th:object="${player}" method="post">
    <div class="mb-3">
        <label class="form-label">Nombre</label>
        <input type="text" th:field="*{playerName}" class="form-control"/>
    </div>

    <div class="mb-3">
        <label class="form-label">Username</label>
        <input type="text" th:field="*{username}" class="form-control"/>
    </div>

    <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="text" th:field="*{playerEmail}" class="form-control"/>
    </div>

            <div class="mb-3">
                <label class="form-label">Elige un rol:</label>
                <select th:field="*{playerRole}" class="form-select">
                    <option value="">-- Selecciona --</option>
                    <option th:each="rol : ${roles}" th:value="${rol}" th:text="${rol.displayNames}"></option>
                </select>
            </div>

            <div class="mb-3">
                <label class="form-label">Elige un equipo:</label>
                <select th:field="*{team}" class="form-select"> <option value="">-- Selecciona equipo --</option>
                    <option th:each="team : ${teams}" th:value="${team.teamId}" th:text="${team.teamName}"></option>
                </select>
            </div>

            <div class="d-grid gap-2">
                <button type="submit" class="btn btn-primary">Guardar Jugador</button>
            </div>
        </form>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
