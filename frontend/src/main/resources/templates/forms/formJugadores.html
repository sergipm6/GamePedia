<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formulario de Jugadores | GamePedia</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<div th:replace="~{/templateFragments/navBar :: menuComun}"></div>

<div class="container mt-5 mb-5">
    <div class="row justify-content-center">
        <div class="col-md-6">

            <h1 class="mb-4">
                <i class="bi bi-person-plus-fill me-2 text-primary"></i>Añadir Jugador
            </h1>

            <div class="card shadow p-4">
                <form th:action="@{/add/players}" th:object="${player}" method="post">

                    <div class="mb-4">
                        <label class="form-label">Nombre Real</label>
                        <input type="text" th:field="*{playerName}" class="form-control"
                               placeholder="Ej: Lee Sang-hyeok">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Username / Alias</label>
                        <input type="text" th:field="*{username}" class="form-control"
                               placeholder="Ej: Faker, s1mple...">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Edad</label>
                        <input type="number" th:field="*{age}" class="form-control"
                             min="16" max="100"  placeholder="18">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Country</label>
                        <input type="text" th:field="*{country}" class="form-control"
                                placeholder="Ej: Japan">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Email</label>
                        <input type="email" th:field="*{playerEmail}" class="form-control"
                               placeholder="jugador@equipo.com">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Posición / Rol</label>
                        <input type="text" th:field="*{position}" class="form-control"
                                 placeholder="TOPLANER">
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Juego</label>
                        <select th:field="*{game}" class="form-select">
                            <option value="">— Selecciona juego —</option>
                            <option th:each="game : ${game}"
                                    th:value="${game.gameId}"
                                    th:text="${game.gameName}"></option>
                        </select>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Equipo</label>
                        <select th:field="*{team}" class="form-select">
                            <option value="">— Selecciona equipo —</option>
                            <option th:each="team : ${teams}"
                                    th:value="${team.teamId}"
                                    th:text="${team.teamName}"></option>
                        </select>
                    </div>


                    <div class="col-md-6">
                        <label class="form-label">Foto de perfil</label>
                        <input type="url" th:field="*{ImageUrl}" class="form-control"
                               placeholder="https://ejemplo.com/imagen.png">
                    </div>

                    <div class="d-grid gap-2 mt-4">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-floppy me-1"></i>Guardar Jugador
                        </button>
                    </div>

                </form>
            </div>

        </div>
    </div>
</div>

</body>
</html>
