<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Formulario de Equipo | GamePedia</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link href="https://cdn.jsdelivr.net/npm/tom-select/dist/css/tom-select.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/tom-select/dist/js/tom-select.complete.min.js"></script>
  <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<div th:replace="~{templateFragments/navBar :: menuComun}"></div>

<div class="container mt-5 mb-5">
  <div class="row justify-content-center">
    <div class="col-md-8">

      <div class="card shadow">
        <div class="card-header">
          <i class="bi bi-pencil-square me-2"></i>Datos del Equipo
        </div>

        <div class="card-body p-4">
          <form th:action="@{/admin/saveTeam}" th:object="${team}" method="post">

            <input type="hidden" th:field="*{teamId}">

            <div class="row g-3">

              <div class="col-md-6">
                <label class="form-label">Nombre del Equipo</label>
                <input type="text" th:field="*{teamName}" class="form-control"
                       placeholder="Ej: T1, G2 Esports..." required>
              </div>

              <div class="col-md-6">
                <label class="form-label">País</label>
                <input type="text" th:field="*{country}" class="form-control"
                       placeholder="Ej: Corea del Sur, España...">
              </div>

              <div class="col-md-6">
                <label class="form-label">Juego</label>
                <select th:field="*{game}" class="form-select" required>
                  <option value="" selected disabled>Selecciona un juego...</option>
                  <option th:each="g : ${games}" th:value="${g.gameId}" th:text="${g.gameName}"></option>
                </select>
              </div>

              <div class="col-12">
                <label class="form-label d-flex justify-content-between">
                  <span><i class="bi bi-trophy me-1"></i> Ligas / Competiciones</span>
                </label>
                <select th:field="*{leagues}" id="league-select" multiple placeholder="Selecciona competiciones...">
                  <option th:each="l : ${leagues}" th:value="${l.leagueId}" th:text="${l.leagueName}"></option>
                </select>
                <div class="form-text">
                  El equipo aparecerá listado en todas las competiciones seleccionadas.
                </div>
              </div>

              <div class="col-md-6">
                <label class="form-label">Total de Trofeos 🏆</label>
                <input type="number" th:field="*{trophies}" class="form-control" min="0">
              </div>

              <div class="col-12">
                <label class="form-label">URL del Logo</label>
                <input type="url" th:field="*{imageUrl}" class="form-control"
                       placeholder="https://ejemplo.com/logo.png">
              </div>

              <div class="col-12">
                <label class="form-label">Palmarés Destacado</label>
                <input type="text" th:field="*{palmares}" class="form-control"
                       placeholder="Ej: 4x Campeón Mundial, 10x LCK...">
              </div>

              <div class="col-12">
                <label class="form-label">Historia del Equipo</label>
                <textarea th:field="*{history}" class="form-control" rows="4"
                          placeholder="Escribe una breve historia del equipo..."></textarea>
              </div>

            </div>

            <div class="d-flex justify-content-end mt-4" style="gap:0.75rem;">
              <a th:href="@{/teams}" class="btn btn-outline-secondary rounded-pill px-4">
                Cancelar
              </a>
              <button type="submit" class="btn btn-primary rounded-pill px-4 fw-bold">
                <i class="bi bi-floppy me-1"></i>Guardar Equipo
              </button>
            </div>

          </form>
        </div>
      </div>

    </div>
  </div>
</div>
<script>
  new TomSelect("#league-select", {
      plugins: ['remove_button'],
      create: false,
  });
</script>
</body>
</html>
