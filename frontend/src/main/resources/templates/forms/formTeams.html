<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Formulario de Equipo | eSports Manager</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<div th:replace="~{templateFragments/navBar :: menuComun}"></div>

<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-8">
      <div class="card shadow border-0" style="border-radius: 20px;">
        <div class="card-header bg-primary text-white py-3" style="border-radius: 20px 20px 0 0;">
          <h4 class="mb-0 text-center fw-bold">
            <i class="bi bi-pencil-square me-2"></i> Datos del Equipo
          </h4>
        </div>
        <div class="card-body p-4">
          <form th:action="@{/teams/save}" th:object="${team}" method="post">

            <input type="hidden" th:field="*{teamId}">

            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label fw-bold">Nombre del Equipo</label>
                <input type="text" th:field="*{teamName}" class="form-control" placeholder="Ej: T1, G2 Esports..." required>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-bold">País</label>
                <input type="text" th:field="*{country}" class="form-control" placeholder="Ej: Corea del Sur, España...">
              </div>

              <div class="col-md-6">
                <label class="form-label fw-bold">Juego</label>
                <select th:field="*{game}" class="form-select" required>
                  <option value="" selected disabled>Selecciona un juego...</option>
                  <option th:each="g : ${games}" th:value="${g.gameId}" th:text="${g.gameName}"></option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-bold">Liga / Competición</label>
                <select th:field="*{league}" class="form-select">
                  <option value="" selected>Sin liga (Agente libre)</option>
                  <option th:each="l : ${leagues}" th:value="${l.leagueId}" th:text="${l.leagueName}"></option>
                </select>
              </div>

              <div class="col-md-6">
                <label class="form-label fw-bold">Total de Trofeos 🏆</label>
                <input type="number" th:field="*{trophies}" class="form-control" min="0">
              </div>

              <div class="col-12">
                <label class="form-label fw-bold">URL del Logo (Imagen)</label>
                <input type="url" th:field="*{imageUrl}" class="form-control" placeholder="https://ejemplo.com/logo.png">
              </div>

              <div class="col-12">
                <label class="form-label fw-bold">Palmarés Destacado</label>
                <input type="text" th:field="*{palmares}" class="form-control" placeholder="Ej: 4x Campeón Mundial, 10x LCK...">
              </div>

              <div class="col-12">
                <label class="form-label fw-bold">Historia del Equipo</label>
                <textarea th:field="*{history}" class="form-control" rows="4" placeholder="Escribe una breve historia del equipo..."></textarea>
              </div>
            </div>

            <div class="d-grid gap-2 d-md-flex justify-content-md-end mt-4">
              <a th:href="@{/teams}" class="btn btn-outline-secondary rounded-pill px-4">Cancelar</a>
              <button type="submit" class="btn btn-primary rounded-pill px-4 fw-bold shadow-sm">
                Guardar Equipo
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>

</body>
</html>
