<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Formulario de entrenadores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="/style.css" />
</head>
<body>
<div th:replace="~{/templateFragments/navBar :: menuComun}"></div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6 card p-4 shadow-sm">
            <h1 class="mb-4 text-center">Añadir entrenador</h1>

            <form th:action="@{/create/trainer}" th:object="${trainer}" method="post">

                <div class="mb-3">
                    <label class="form-label">Nombre:</label>
                    <input type="text" th:field="*{trainerName}" class="form-control" />
                </div>

                <div class="mb-3">
                    <label class="form-label">Edad:</label>
                    <input type="number" th:field="*{trainerAge}" class="form-control" />
                </div>

                <div class="mb-3">
                    <label class="form-label">País:</label>
                    <input type="text" th:field="*{trainerCountry}" class="form-control" />
                </div>

                <div class="mb-3">
                    <label class="form-label">Equipo:</label>
                    <select th:field="*{team}" class="form-select">
                        <option value="">-- Selecciona un equipo --</option>
                        <option th:each="t : ${teams}"
                                th:value="${t.teamId}"
                                th:text="${t.teamName}"></option>
                    </select>
                </div>

                <div class="d-grid mt-4">
                    <button type="submit" class="btn btn-primary">Guardar entrenador</button>
                </div>

            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
