<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Formulario de Juego | GamePedia</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <link rel="stylesheet" th:href="@{/style.css}">
</head>
<body>

<div th:replace="~{templateFragments/navBar :: menuComun}"></div>

<div class="container mt-5 mb-5">
  <div class="row justify-content-center">
    <div class="col-md-8">

      <div class="card shadow">
        <div class="card-header">
          <i class="bi bi-controller me-2"></i>Datos del Juego
        </div>

        <div class="card-body p-4">
          <form th:action="@{/admin/saveGame}" th:object="${game}" method="post">

            <input type="hidden" th:field="*{gameId}">

            <div class="row g-3">

              <!-- Nombre -->
              <div class="col-md-6">
                <label class="form-label">Nombre del Juego</label>
                <input type="text" th:field="*{gameName}" class="form-control"
                       placeholder="Ej: League of Legends, Valorant..." required>
              </div>

              <!-- Género -->
              <div class="col-md-6">
                <label class="form-label">Género</label>
                <select th:field="*{gameGenre}" class="form-select">
                  <option value="">— Selecciona un género —</option>
                  <option value="MOBA">MOBA</option>
                  <option value="RPG">RPG</option>
                  <option value="MMORPG">MMORPG</option>
                  <option value="FPS">FPS</option>
                  <option value="Battle Royale">Battle Royale</option>
                  <option value="RTS">RTS</option>
                  <option value="Fighting">Fighting</option>
                  <option value="Sports">Sports</option>
                  <option value="Historia">Historia</option>
                  <option value="Card Game">Card Game</option>
                  <option value="Other">Otro</option>
                </select>
              </div>

              <!-- Desarrolladora -->
              <div class="col-md-6">
                <label class="form-label">Desarrolladora</label>
                <input type="text" th:field="*{gameDeveloper}" class="form-control"
                       placeholder="Ej: Riot Games, Valve, Blizzard...">
              </div>

              <!-- Año de lanzamiento -->
              <div class="col-md-6">
                <label class="form-label">Año de Lanzamiento</label>
                <input type="number" th:field="*{releaseYear}" class="form-control"
                       min="1990" max="2030" placeholder="Ej: 2009">
              </div>

              <!-- Jugadores pico -->
              <div class="col-md-6">
                <label class="form-label">Jugadores</label>
                <input type="text" th:field="*{peakPlayers}" class="form-control"
                       placeholder="Ej: 180M jugadores registrados">
              </div>

              <!-- URL imagen -->
              <div class="col-md-6">
                <label class="form-label">URL de la Imagen / Banner</label>
                <input type="url" th:field="*{gameImageUrl}" class="form-control"
                       placeholder="https://ejemplo.com/imagen.png">
              </div>

              <!-- Competiciones principales -->
              <div class="col-12">
                <label class="form-label">Principales Competiciones</label>
                <input type="text" th:field="*{mainCompetitions}" class="form-control"
                       placeholder="Ej: Worlds, LEC, LCK, LCS...">
              </div>

              <!-- Premios -->
              <div class="col-12">
                <label class="form-label">Premios</label>
                <div class="input-group mb-2">
                  <input type="text" id="awardInput" class="form-control" placeholder="Ej: GOTY 2023">
                  <button class="btn btn-outline-primary mt-3" type="button" onclick="addAward()">Añadir</button>
                </div>

                <ul id="awardsList" class="list-group mb-3">
                  <li th:each="award, stat : *{awards}" class="list-group-item d-flex justify-content-between align-items-center">
                    <span th:text="${award}"></span>
                    <input type="hidden" th:field="*{awards[__${stat.index}__]}" th:value="${award}">
                    <button type="button" class="btn btn-sm btn-danger" onclick="removeAward(this)">×</button>
                  </li>
                </ul>
              </div>

              <!-- Descripción -->
              <div class="col-12">
                <label class="form-label">Historia / Descripción</label>
                <textarea th:field="*{gameDescription}" class="form-control" rows="5"
                          placeholder="Escribe una descripción del juego, su historia, impacto en los esports..."></textarea>
              </div>

            </div>

            <div class="d-flex justify-content-end mt-4" style="gap:0.75rem;">
              <a th:href="@{lists/listGames}" class="btn btn-outline-secondary rounded-pill px-4">
                Cancelar
              </a>
              <button type="submit" class="btn btn-primary rounded-pill px-4 fw-bold">
                <i class="bi bi-floppy me-1"></i>Guardar Juego
              </button>
            </div>

          </form>
        </div>
      </div>

    </div>
  </div>
</div>
<script>
  function addAward() {
        const input = document.getElementById('awardInput');
        const value = input.value.trim();
        if (value === "") return;

        const list = document.getElementById('awardsList');
        const index = list.children.length;

        const li = document.createElement('li');
        li.className = "list-group-item d-flex justify-content-between align-items-center mt-1";
        li.innerHTML = `
            <span>${value}</span>
            <input type="hidden" name="awards[${index}]" value="${value}">
            <button type="button" class="btn btn-sm btn-danger" onclick="removeAward(this)">×</button>
        `;

        list.appendChild(li);
        input.value = ""; // Limpiar input
    }

    function removeAward(btn) {
        btn.parentElement.remove();
        // Opcional: Renumerar índices si Spring se queja de huecos en la lista
        Array.from(document.querySelectorAll('#awardsList input')).forEach((input, i) => {
            input.name = `awards[${i}]`;
        });
    }
</script>
</body>
</html>
