<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${trainer.trainerName} + ' | Entrenador'">Ficha de Entrenador</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<div th:replace="~{templateFragments/navBar :: menuComun}"></div>

<div class="container mt-5 mb-5">
    <div class="card shadow">

        <!-- Hero -->
        <div class="hero-team text-center p-5 position-relative"
             style="background: linear-gradient(135deg, rgba(0,0,0,0.85) 0%, rgba(20,15,0,0.5) 100%);">

            <!-- Botones admin -->
            <div sec:authorize="hasRole('ADMIN')"
                 class="position-absolute top-0 end-0 p-3 d-flex gap-2">
                <a th:href="@{/admin/editTrainer/{id}(id=${trainer.trainerId})}"
                   class="btn btn-dark btn-sm border-warning text-warning">
                    <i class="bi bi-pencil"></i>
                </a>
                <button type="button" class="btn btn-dark btn-sm border-danger text-danger"
                        data-bs-toggle="modal" data-bs-target="#deleteTrainerModal">
                    <i class="bi bi-trash"></i>
                </button>
            </div>

            <!-- Badge juego -->
            <div class="d-flex justify-content-center gap-2 mb-3">
                <div th:if="${trainer.team != null && trainer.team.game != null}"
                     class="game-badge" style="border-color:var(--accent-gold); color:var(--accent-gold);">
                    <i class="bi bi-controller"></i>
                    <span th:text="${trainer.team.game.gameName}">Juego</span>
                </div>
                <div class="game-badge" style="border-color:var(--accent-gold); color:var(--accent-gold);">
                    <i class="bi bi-person-badge-fill"></i>
                    <span>Head Coach</span>
                </div>
            </div>

            <!-- Avatar -->
            <div class="mb-3" style="margin-top:1rem;">
                <img th:if="${trainer.imageUrl != null && !trainer.imageUrl.isEmpty()}"
                     th:src="${trainer.imageUrl}"
                     width="150" height="150"
                     class="rounded-circle shadow object-fit-cover"
                     style="margin:0 auto; border:4px solid var(--accent-gold); padding:5px; background:rgba(0,0,0,0.5);">
                <div th:unless="${trainer.imageUrl != null && !trainer.imageUrl.isEmpty()}"
                     style="width:150px; height:150px; border-radius:50%; margin:0 auto;
                            background:var(--bg-elevated); border:4px solid var(--accent-gold);
                            display:flex; align-items:center; justify-content:center; font-size:3.5rem;">
                    👨‍💼
                </div>
            </div>

            <!-- Nombre -->
            <h1 class="display-4 fw-bold mb-1" style="color:var(--text-primary);"
                th:text="${trainer.trainerName}">Nombre del Entrenador</h1>

            <!-- Equipo -->
            <div class="mt-3 d-inline-block p-2 rounded-pill px-4"
                 style="background:rgba(255,193,7,0.1); border:1px solid var(--accent-gold);">
                <span>
                    <i class="bi bi-shield-shaded me-2" style="color:var(--accent-gold);"></i>
                    <a th:if="${trainer.team != null}"
                       th:href="@{/teams/details/{id}(id=${trainer.team.teamId})}"
                       class="text-decoration-none fw-bold"
                       style="color:var(--accent-gold);"
                       th:text="${trainer.team.teamName}">Nombre del Equipo</a>
                    <span th:unless="${trainer.team != null}" style="color:var(--text-muted);">Sin equipo asignado</span>
                </span>
            </div>
        </div>

        <!-- Cuerpo -->
        <div class="card-body p-5">
            <div class="row g-4">

                <!-- Info personal -->
                <div class="col-md-6">
                    <h3 class="section-title">
                        <i class="bi bi-person-lines-fill me-2"></i>Información Personal
                    </h3>
                    <div class="list-group list-group-flush bg-transparent">
                        <div class="list-group-item bg-transparent border-secondary d-flex justify-content-between align-items-center px-0"
                             style="color:var(--text-secondary);">
                            <span><i class="bi bi-calendar-event me-2 text-primary"></i>Edad</span>
                            <span style="color:var(--text-primary); font-weight:600;"
                                  th:text="${trainer.trainerAge != null ? trainer.trainerAge + ' años' : 'N/D'}">—</span>
                        </div>
                        <div class="list-group-item bg-transparent border-secondary d-flex justify-content-between align-items-center px-0"
                             style="color:var(--text-secondary);">
                            <span><i class="bi bi-geo-alt me-2 text-danger"></i>País</span>
                            <span style="color:var(--text-primary); font-weight:600;"
                                  th:text="${trainer.trainerCountry != null ? trainer.trainerCountry : 'N/D'}">—</span>
                        </div>
                        <div th:if="${trainer.team != null && trainer.team.game != null}"
                             class="list-group-item bg-transparent border-secondary d-flex justify-content-between align-items-center px-0"
                             style="color:var(--text-secondary);">
                            <span><i class="bi bi-joystick me-2" style="color:var(--accent-cyan);"></i>Juego</span>
                            <span style="color:var(--accent-cyan); font-weight:600;"
                                  th:text="${trainer.team.game.gameName}">—</span>
                        </div>
                    </div>
                </div>

                <!-- Panel equipo -->
                <div class="col-md-6">
                    <div class="card border-primary p-4 h-100"
                         style="background:rgba(0,0,0,0.2); border:1px solid var(--accent-gold) !important;">
                        <h3 class="section-title h4">
                            <i class="bi bi-trophy me-2" style="color:var(--accent-gold);"></i>Perfil Técnico
                        </h3>
                        <div class="text-center mt-3">
                            <div th:if="${trainer.team != null}">
                                <p class="mb-1" style="color:var(--text-muted); font-size:0.7rem; text-transform:uppercase; letter-spacing:0.1em;">Equipo actual</p>
                                <a th:href="@{/teams/{id}(id=${trainer.team.teamId})}"
                                   class="text-decoration-none">
                                    <div style="display:flex; align-items:center; justify-content:center; gap:0.75rem; margin-top:0.5rem;">
                                        <div style="width:44px; height:44px; border-radius:50%; overflow:hidden;
                                             background:var(--bg-elevated); border:2px solid var(--accent-gold);
                                             display:flex; align-items:center; justify-content:center;">
                                            <img th:if="${trainer.team.imageUrl != null && !trainer.team.imageUrl.isEmpty()}"
                                                 th:src="${trainer.team.imageUrl}"
                                                 style="width:100%;height:100%;object-fit:cover;">
                                            <i th:unless="${trainer.team.imageUrl != null && !trainer.team.imageUrl.isEmpty()}"
                                               class="bi bi-shield-fill" style="color:var(--accent-gold);"></i>
                                        </div>
                                        <span class="fw-bold" style="color:var(--accent-gold); font-size:1.1rem;"
                                              th:text="${trainer.team.teamName}">Equipo</span>
                                    </div>
                                </a>
                            </div>
                            <div th:unless="${trainer.team != null}"
                                 style="color:var(--text-muted); margin-top:1rem;">
                                <i class="bi bi-slash-circle display-6 mb-2 d-block"></i>
                                Sin equipo asignado
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div th:replace="~{templateFragments/commentFragment :: commentSection(
          'trainer',
          ${trainer.trainerId},
          ${comments},
          '/trainer/' + ${trainer.trainerId}
          )}"></div>

            <!-- Botones -->
            <div class="mt-5 pt-4 border-top d-flex"
                 style="gap:0.75rem; justify-content:space-between; align-items:center;">
                <a th:href="@{/trainers}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i>Volver
                </a>
                <a sec:authorize="hasRole('ADMIN')"
                   th:href="@{/admin/editTrainer/{id}(id=${trainer.id})}"
                   class="btn btn-primary">
                    <i class="bi bi-pencil-square me-1"></i>Editar Entrenador
                </a>
            </div>
        </div>
    </div>
</div>

<!-- Modal eliminar -->
<div class="modal fade" id="deleteTrainerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-light border-danger">
            <div class="modal-header border-danger">
                <h5 class="modal-title">Confirmar Eliminación</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                ¿Estás seguro de que deseas eliminar a
                <strong th:text="${trainer.trainerName}"></strong>?
            </div>
            <div class="modal-footer border-danger">
                <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                <form th:action="@{/admin/deleteTrainer/{id}(id=${trainer.id})}" method="post">
                    <button type="submit" class="btn btn-danger">Eliminar</button>
                </form>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{templateFragments/footer :: footer}"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
