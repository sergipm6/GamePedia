<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${game.gameName}">Ficha del Juego</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<div th:replace="~{templateFragments/navBar :: menuComun}"></div>

<div class="container mt-5 mb-5">
    <div class="card shadow">

        <!-- Hero -->
        <div class="hero-game"
             th:style="${game.gameImageUrl != null && !game.gameImageUrl.isEmpty()}
             ? 'background-image: linear-gradient(to bottom, rgba(8,12,16,0.3) 0%, rgba(8,12,16,0.97) 100%), url(' + ${game.gameImageUrl} + '); background-size: cover; background-position: center;'
             : ''">
            <div class="hero-game-content">

                <div class="mb-3 d-flex gap-2">
                    <span th:if="${game.gameGenre != null}" class="game-badge">
                        <i class="bi bi-joystick"></i>
                        <span th:text="${game.gameGenre}">MOBA</span>
                    </span>
                    <span th:if="${game.hasCompetitiveScene}" class="game-badge"
                          style="border-color: var(--accent-gold); color: var(--accent-gold);">
                        <i class="bi bi-trophy-fill"></i> Competitivo
                    </span>
                </div>

                <h1 class="display-4 fw-bold" th:text="${game.gameName}">Nombre del Juego</h1>

                <div class="hero-meta">
                    <span th:if="${game.gameDeveloper != null}">
                        <i class="bi bi-building me-1"></i>
                        <span th:text="${game.gameDeveloper}">Desarrolladora</span>
                    </span>
                    <span th:if="${game.releaseYear != null}" class="hero-meta-sep">·</span>
                    <span th:if="${game.releaseYear != null}">
                        <i class="bi bi-calendar3 me-1"></i>
                        <span th:text="${game.releaseYear}">2009</span>
                    </span>
                    <span th:if="${game.peakPlayers != null}" class="hero-meta-sep">·</span>
                    <span th:if="${game.peakPlayers != null}">
                        <i class="bi bi-people-fill me-1"></i>
                        <span th:text="${game.peakPlayers}">180M jugadores</span>
                    </span>
                </div>

            </div>
        </div>

        <!-- Cuerpo -->
        <div class="card-body p-5">
            <div class="row g-4">

                <!-- Descripción -->
                <div class="col-md-8">
                    <h3 class="section-title">
                        <i class="bi bi-book me-2"></i>Historia
                    </h3>
                    <p class="lh-lg" style="white-space:pre-line; color:var(--text-secondary);"
                       th:text="${game.gameDescription != null ? game.gameDescription
                       : 'Este juego aún no tiene descripción en nuestros registros.'}">
                    </p>
                </div>

                <!-- Panel lateral -->
                <div class="col-md-4" style="display:flex; flex-direction:column; gap:1rem;">

                    <!-- Info -->
                    <div class="card border-primary p-3">
                        <h4 class="section-title h5">
                            <i class="bi bi-info-circle me-2"></i>Información
                        </h4>
                        <ul class="list-unstyled" style="display:flex; flex-direction:column; gap:0.75rem;">
                            <li th:if="${game.gameGenre != null}">
                                <span style="color:var(--text-muted); font-size:0.7rem; text-transform:uppercase; letter-spacing:0.1em; font-family:var(--font-display);">Género</span>
                                <div style="color:var(--text-primary); font-weight:600;" th:text="${game.gameGenre}"></div>
                            </li>
                            <li th:if="${game.gameDeveloper != null}">
                                <span style="color:var(--text-muted); font-size:0.7rem; text-transform:uppercase; letter-spacing:0.1em; font-family:var(--font-display);">Desarrolladora</span>
                                <div style="color:var(--text-primary); font-weight:600;" th:text="${game.gameDeveloper}"></div>
                            </li>
                            <li th:if="${game.releaseYear != null}">
                                <span style="color:var(--text-muted); font-size:0.7rem; text-transform:uppercase; letter-spacing:0.1em; font-family:var(--font-display);">Lanzamiento</span>
                                <div style="color:var(--text-primary); font-weight:600;" th:text="${game.releaseYear}"></div>
                            </li>
                            <li th:if="${game.peakPlayers != null}">
                                <span style="color:var(--text-muted); font-size:0.7rem; text-transform:uppercase; letter-spacing:0.1em; font-family:var(--font-display);">Jugadores</span>
                                <div style="color:var(--accent-cyan); font-weight:600;" th:text="${game.peakPlayers}"></div>
                            </li>
                        </ul>
                    </div>

                    <!-- Premios -->
                    <div class="card border-primary p-3"
                         th:if="${game.awards != null && !game.awards.isEmpty()}">
                        <h4 class="section-title h5">
                            <i class="bi bi-patch-check-fill me-2" style="color:var(--accent-gold);"></i>Premios
                        </h4>
                        <ul class="list-unstyled mb-0" style="display:flex; flex-direction:column; gap:0.5rem;">
                            <li th:each="award : ${game.awards}" class="small"
                                style="color:var(--text-secondary); display:flex; align-items:flex-start; gap:0.5rem;">
                                <i class="bi bi-patch-check-fill"
                                   style="color:var(--accent-gold); font-size:0.8rem; margin-top:0.2rem;"></i>
                                <span th:text="${award}"></span>
                            </li>
                        </ul>
                    </div>

                </div>
            </div>
            <!-- FIN row descripción + panel lateral -->

            <!-- Ligas y Torneos -->
            <div class="mt-5 pt-4 border-top"
                 th:if="${game.hasCompetitiveScene && !game.leagues.isEmpty()}">
                <h3 class="section-title mb-4">
                    <i class="bi bi-trophy me-2"></i>Ligas y Torneos
                </h3>

                <div class="row row-cols-1 row-cols-md-3 g-3">
                    <div class="col" th:each="league : ${game.leagues}">
                        <a th:href="@{/leagues/{id}(id=${league.leagueId})}" style="text-decoration:none;">
                            <div class="card team-card-hover text-center h-100" style="position:relative; overflow:hidden;">

                                <!-- Badge -->
                                <div style="position:absolute; top:0.75rem; right:0.75rem; z-index:1;">
                                    <span th:if="${league.international}" class="badge bg-warning">
                                        <i class="bi bi-globe2 me-1"></i>Internacional
                                    </span>
                                    <span th:unless="${league.international}" class="badge bg-dark">
                                        <i class="bi bi-geo-alt me-1"></i>Regional
                                    </span>
                                </div>

                                <!-- Imagen o icono fallback -->
                                <div style="height:120px; display:flex; align-items:center; justify-content:center;
                                background:var(--bg-elevated); overflow:hidden;">
                                    <img th:if="${league.imageUrl != null && !league.imageUrl.isEmpty()}"
                                         th:src="${league.imageUrl}"
                                         th:alt="${league.leagueName}"
                                         style="width:100%; height:100%; object-fit:cover;">
                                    <span th:unless="${league.imageUrl != null && !league.imageUrl.isEmpty()}"
                                          style="font-size:3rem;"
                                          th:text="${league.international} ? '🌍' : '📍'"></span>
                                </div>

                                <!-- Info -->
                                <div class="card-body" style="padding:1rem;">
                                    <h5 class="fw-bold text-uppercase mb-1"
                                        style="color:var(--text-primary); font-size:0.85rem; letter-spacing:0.08em;"
                                        th:text="${league.leagueName}">Liga</h5>
                                    <p class="small text-muted mb-0"
                                       style="overflow:hidden; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical;"
                                       th:text="${league.leagueDescription}"></p>
                                </div>

                            </div>
                        </a>
                    </div>
                </div>
            </div>
            <!-- FIN Ligas -->
            <!-- Comentarios -->
            <div th:replace="~{templateFragments/commentFragment :: commentSection(
          'GAME',
          ${game.gameId},
          ${comments},
          '/game/' + ${game.gameId}
      )}"></div>
            <!-- Botones — siempre visibles -->
            <div class="mt-5 pt-4 border-top d-flex"
                 style="gap:0.75rem; justify-content:space-between; align-items:center;">
                <a th:href="@{/games}" class="btn btn-outline-secondary">
                    <i class="bi bi-arrow-left me-1"></i>Volver
                </a>
                <a sec:authorize="hasRole('ADMIN')"
                   th:href="@{/admin/editGame/{id}(id=${game.gameId})}"
                   class="btn btn-primary">
                    <i class="bi bi-pencil-square me-1"></i>Editar Juego
                </a>
            </div>

        </div>

    </div>
</div>

<div th:replace="~{templateFragments/footer :: footer}"></div>
</body>
</html>
