<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title th:text="${team.teamName}">Ficha del Equipo</title>
    <style>
        .hero-team {
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
            color: white;
            padding: 3rem 0;
            border-radius: 15px 15px 0 0;
        }
        .trophy-icon { color: #ffd700; font-size: 1.5rem; }
        .section-title { border-left: 5px solid #2a5298; padding-left: 15px; margin-bottom: 1.5rem; }
        .game-badge {
            background: rgba(255, 255, 255, 0.2);
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.9rem;
            display: inline-flex;
            align-items: center;
            backdrop-filter: blur(5px);
        }
    </style>
</head>
<body class="bg-light">
<div th:replace="~{templateFragments/navBar :: menuComun}"></div>

<div class="container mt-5 mb-5">
    <div class="card shadow border-0">
        <div class="hero-team text-center">
            <div class="mb-2" th:if="${team.league != null and team.league.game != null}">
                <div class="game-badge">
                    <i class="bi bi-controller me-2"></i>
                    <span class="fw-bold text-uppercase" th:text="${team.league.game.gameName}">Nombre del Juego</span>
                </div>
            </div>

            <div class="mb-3">
                <img th:if="${team.imageUrl}" th:src="${team.imageUrl}" width="120" class="rounded-circle shadow bg-white">
                <div th:unless="${team.imageUrl}" class="display-1">🛡️</div>
            </div>

            <h1 class="display-4 fw-bold" th:text="${team.teamName}">Nombre del Equipo</h1>

            <p class="lead opacity-75">
                <i class="bi bi-trophy small"></i>
                <span th:text="${team.league.leagueName}">Competición</span>
            </p>
        </div>

        <div class="card-body p-5">
            <div class="row">
                <div class="col-md-8">
                    <h3 class="section-title">Historia</h3>
                    <p class="text-muted lh-lg" style="white-space: pre-line;"
                       th:text="${team.history != null ? team.history : 'Este equipo aún no ha escrito su historia en nuestros registros.'}">
                        Aquí va la historia detallada...
                    </p>
                </div>

                <div class="col-md-4">
                    <div class="card bg-white border-primary p-3">
                        <h3 class="section-title h4">Palmarés</h3>
                        <ul class="list-unstyled">
                            <li class="mb-3 d-flex align-items-center">
                                <span class="trophy-icon me-2">🏆</span>
                                <div>
                                    <h6 class="mb-0 fw-bold">Títulos Totales</h6>
                                    <small th:text="${team.trophies != null ? team.trophies : '0'}">12</small>
                                </div>
                            </li>
                            <hr>
                            <li class="mb-2">
                                <h6 class="fw-bold text-primary">Logros Destacados:</h6>
                                <p class="small text-muted" th:text="${team.palmares != null ? team.palmares : 'Buscando en las vitrinas...'}">
                                    Subcampeón de Invierno 2024, Campeón de Copa...
                                </p>
                            </li>
                        </ul>
                    </div>
                </div>
            </div>

            <div class="mt-5 pt-4 border-top text-center">
                <a th:href="@{/teams}" class="btn btn-outline-primary px-5">Volver</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
