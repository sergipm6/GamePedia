<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title th:text="${team.teamName}">Ficha del Equipo</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<div th:replace="~{templateFragments/navBar :: menuComun}"></div>

<div class="container mt-5 mb-5">
    <div class="card shadow">

        <!-- Hero -->
        <div class="hero-team">
            <div class="mb-2" th:if="${team.league != null and team.league.game != null}">
                <div class="game-badge">
                    <i class="bi bi-controller"></i>
                    <span th:text="${team.league.game.gameName}">Nombre del Juego</span>
                </div>
            </div>

            <div class="mb-3" style="margin-top:1.5rem;">
                <img th:if="${team.imageUrl}" th:src="${team.imageUrl}"
                     width="120" class="rounded-circle shadow"
                     style="margin:0 auto; border:3px solid var(--accent-cyan);">
                <div th:unless="${team.imageUrl}" class="display-1">🛡️</div>
            </div>

            <h1 class="display-4 fw-bold" th:text="${team.teamName}">Nombre del Equipo</h1>

            <p class="lead opacity-75" style="margin-top:0.75rem;">
                <i class="bi bi-trophy small me-1"></i>
                <span th:text="${team.league.leagueName}">Competición</span>
            </p>
        </div>

        <!-- Body -->
        <div class="card-body p-5">
            <div class="row">

                <!-- Historia -->
                <div class="col-md-8">
                    <h3 class="section-title">Historia</h3>
                    <p class="lh-lg"
                       style="white-space: pre-line; color: var(--text-secondary);"
                       th:text="${team.history != null ? team.history : 'Este equipo aún no ha escrito su historia en nuestros registros.'}">
                        Aquí va la historia detallada...
                    </p>
                </div>

                <!-- Palmarés -->
                <div class="col-md-4">
                    <div class="card border-primary p-3">
                        <h3 class="section-title h4">Palmarés</h3>
                        <ul class="list-unstyled">
                            <li class="mb-3 d-flex align-items-center" style="gap:0.75rem;">
                                <span class="trophy-icon">🏆</span>
                                <div>
                                    <h6 class="mb-0 fw-bold" style="color:var(--text-primary);">Títulos Totales</h6>
                                    <small style="color:var(--accent-gold);"
                                           th:text="${team.trophies != null ? team.trophies : '0'}">12</small>
                                </div>
                            </li>
                            <hr>
                            <li class="mb-2">
                                <h6 class="fw-bold text-primary">Logros Destacados:</h6>
                                <p class="small text-muted"
                                   th:text="${team.palmares != null ? team.palmares : 'Buscando en las vitrinas...'}">
                                    Subcampeón de Invierno 2024...
                                </p>
                            </li>
                        </ul>
                    </div>
                </div>

            </div>

            <div class="mt-5 pt-4 border-top text-center">
                <a th:href="@{/teams}" class="btn btn-outline-primary px-5">
                    <i class="bi bi-arrow-left me-1"></i> Volver
                </a>
            </div>
        </div>

    </div>
</div>
<div th:replace="~{templateFragments/footer :: footer}"></div>
</body>
</html>
