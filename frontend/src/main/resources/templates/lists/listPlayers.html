<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8" />
    <title>Lista de jugadores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="/style.css" />
</head>
<body>
<div th:replace="~{/templateFragments/navBar :: menuComun}"></div>

<div class="container mt-5">
    <h1 class="mb-4">Lista de jugadores</h1>
        <div class="table-responsive">
            <table class="table table-striped table-hover">
               <thead class="table-dark">
               <tr>
                   <th>Nombre</th>
                   <th>Alias</th>
                   <th>Email</th>
                   <th>Rol</th>
                   <th>Equipo</th>
               </tr>
               </thead>
                <tbody>
                    <tr th:each="player : ${players}">
                      <td th:text="${player.playerName}">Nombre</td>
                      <td th:text="${player.username}">Alias</td>
                      <td th:text="${player.playerEmail}">Email</td>
                      <td th:text="${player.playerRole}">Rol</td>
                      <td th:text="${player.team != null ? player.team.teamName : 'Sin equipo'}">Equipo</td>
                    </tr>
                </tbody>
            </table>
        </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
