<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lista de Jugadores | GamePedia</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<div th:replace="~{/templateFragments/navBar :: menuComun}"></div>

<div class="container mt-5 mb-5">

    <h1 class="mb-4">
        <i class="bi bi-people-fill me-2 text-primary"></i>Lista de Jugadores
    </h1>

    <div class="card shadow">
        <div class="table-responsive">
            <table class="table table-hover">
                <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Alias</th>
                    <th>Email</th>
                    <th>Rol</th>
                    <th>Equipo</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="player : ${players}">
                    <td style="color:var(--text-primary);" th:text="${player.playerName}">Nombre</td>
                    <td>
                        <span class="badge bg-primary" th:text="${player.username}">Alias</span>
                    </td>
                    <td th:text="${player.playerEmail}">Email</td>
                    <td>
                        <span class="badge bg-dark" th:text="${player.playerRole}">Rol</span>
                    </td>
                    <td>
              <span class="badge bg-success"
                    th:text="${player.team != null ? player.team.teamName : 'Sin equipo'}">
                Equipo
              </span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>

</body>
</html>
