<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de entrenadores</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <link rel="stylesheet" href="/style.css" />
</head>
<body class="bg-light">

<div th:replace="~{templateFragments/navBar :: menuComun}"></div>

<div class="container mt-5">
    <div class="card shadow">
        <div class="card-header bg-dark text-white">
            <h1 class="h3 mb-0">Lista de Entrenadores</h1>
        </div>
        <div class="card-body p-0"> <table class="table table-striped table-hover mb-0">
            <thead class="table-dark">
            <tr>
                <th>Nombre</th>
                <th>Edad</th>
                <th>País</th>
                <th>Equipo</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="trainer : ${trainers}">
                <td th:text="${trainer.trainerName}" class="fw-bold"></td>
                <td th:text="${trainer.trainerAge}"></td>
                <td th:text="${trainer.trainerCountry}"></td>
                <td>
                                <span class="badge bg-primary"
                                      th:text="${trainer.team?.teamName} ?: 'Sin equipo'">
                                </span>
                </td>
            </tr>
            </tbody>
        </table>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
