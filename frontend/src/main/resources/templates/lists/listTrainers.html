<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lista de Entrenadores | GamePedia</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<div th:replace="~{/templateFragments/navBar :: menuComun}"></div>

<div class="container mt-5 mb-5">

    <h1 class="mb-4">
        <i class="bi bi-headset me-2 text-primary"></i>Lista de Entrenadores
    </h1>

    <div class="card shadow">
        <div class="card-header">Staff Técnico</div>
        <div class="table-responsive">
            <table class="table table-hover table-striped">
                <thead>
                <tr>
                    <th>Nombre</th>
                    <th>Edad</th>
                    <th>País</th>
                    <th>Juego</th>
                    <th>Equipo</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="trainer : ${trainers}">
                    <td class="fw-bold" style="color:var(--text-primary);"
                        th:text="${trainer.trainerName}">Nombre</td>
                    <td th:text="${trainer.trainerAge}">Edad</td>
                    <td th:text="${trainer.trainerCountry}">País</td>
                    <td th:text="${trainer.game.gameName}">Juego</td>
                    <td>
              <span class="badge bg-primary"
                    th:text="${trainer.team?.teamName} ?: 'Sin equipo'">
              </span>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>

</div>
<div th:replace="~{templateFragments/footer :: footer}"></div>
</body>
</html>
