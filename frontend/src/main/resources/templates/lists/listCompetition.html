<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Competiciones | GamePedia</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<div th:replace="~{templateFragments/navBar :: menuComun}"></div>

<div class="container mt-5 mb-5">

    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1><i class="bi bi-trophy-fill me-2 text-primary"></i>Competiciones</h1>
        <a th:href="@{/leagues/new}" class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>Añadir Nueva Liga
        </a>
    </div>

    <hr>

    <!-- Por juego -->
    <div th:each="entry : ${leaguesByGame}" class="mb-5">

        <h2 class="mb-3">
            <i class="bi bi-controller me-2 text-primary"></i>
            <span th:text="${entry.key.gameName}">Nombre del Juego</span>
        </h2>

        <div class="card shadow">
            <div class="table-responsive">
                <table class="table table-hover">
                    <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Tipo</th>
                        <th>Descripción</th>
                        <th>Equipos</th>
                        <th>Acciones</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="l : ${entry.value}">

                        <td style="color:var(--text-primary); font-weight:600;" th:text="${l.leagueName}">Nombre</td>

                        <td>
                            <span class="badge bg-warning" th:if="${l.international}">🌍 Internacional</span>
                            <span class="badge bg-primary" th:unless="${l.international}">📍 Regional</span>
                        </td>

                        <td th:text="${l.leagueDescription}">Descripción</td>

                        <td>
                            <span class="badge bg-dark" th:text="${l.teams.size()}">0</span>
                        </td>

                        <td style="display:flex; gap:0.4rem;">
                            <a th:href="@{/league/update/{id}(id=${l.leagueId})}"
                               class="btn btn-sm btn-outline-warning">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/league/delete/{id}(id=${l.leagueId})}"
                               class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>

                    </tr>
                    </tbody>
                </table>
            </div>
        </div>

    </div>

    <div th:if="${leaguesByGame.isEmpty()}" class="alert alert-info">
        <i class="bi bi-info-circle me-2"></i>No hay ligas creadas todavía.
    </div>

</div>

</body>
</html>
