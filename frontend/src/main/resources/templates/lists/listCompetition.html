<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Competiciones | GamePedia</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/styles.css}">
    <style>
        .card-league {
            transition: transform 0.2s, shadow 0.2s;
            height: 100%;
            text-decoration: none;
            color: inherit;
        }
        .card-league:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
            color: inherit;
        }
        .img-container {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8f9fa;
        }
    </style>
</head>
<body>

<div th:replace="~{templateFragments/navBar :: menuComun}"></div>

<div class="container mt-5 mb-5">
    <div th:each="entry : ${leagues}" class="mb-5">

        <div class="d-flex align-items-center mb-4 border-bottom pb-2">
            <h2 class="fw-bold mb-0 text-uppercase" th:text="${entry.key.gameName}">Nombre del Juego</h2>
        </div>

        <div class="row row-cols-1 row-cols-md-2 row-cols-lg-3 row-cols-xl-4 g-4">

            <div th:each="league : ${entry.value}" class="col">
                <div class="card h-100 shadow-sm card-league border-0">

                    <a th:href="@{/leagues/{id}(id=${league.leagueId})}" class="text-decoration-none color-inherit">
                        <div class="img-container rounded-top">
                            <img th:if="${league.imageUrl}" th:src="${league.imageUrl}"
                                 alt="Logo Liga" class="p-3" style="max-width: 100%; max-height: 100%; object-fit: contain;">
                            <i th:unless="${league.imageUrl}" class="bi bi-trophy text-muted fs-1"></i>
                        </div>

                        <div class="card-body">
                            <div class="d-flex justify-content-between align-items-start mb-2">
                                <h5 class="card-title fw-bold mb-0" th:text="${league.leagueName}">Nombre Liga</h5>
                                <span th:if="${league.international}" class="badge bg-primary">INT</span>
                            </div>
                            <p class="card-text text-muted small"
                               th:text="${#strings.abbreviate(league.leagueDescription, 80)}">Descripción corta...</p>
                        </div>
                    </a>

                    <div class="card-footer bg-transparent border-0 pt-0 pb-3" sec:authorize="hasRole('ADMIN')">
                        <hr class="mt-0">
                        <div class="d-flex justify-content-between align-items-center">
                            <small class="text-muted">ID: <span th:text="${league.leagueId}"></span></small>
                            <a th:href="@{/admin/editLeague/{id}(id=${league.leagueId})}"
                               class="btn btn-sm btn-outline-secondary rounded-pill">
                                <i class="bi bi-pencil-square"></i> Editar
                            </a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{templateFragments/footer :: footer}"></div>
</body>
</html>
