<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Lista de Competiciones</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div th:replace="~{templateFragments/navBar :: menuComun}"></div>

<div class="container mt-4">
    <h1>Competiciones</h1>
    <a th:href="@{/leagues/new}" class="btn btn-primary">Añadir Nueva Liga</a>

    <hr>

    <div th:each="entry : ${leaguesByGame}">

        <h2 th:text="${entry.key.gameName}">Nombre del Juego</h2>

        <table class="table table-striped">
            <thead>
            <tr>
                <th>Nombre</th>
                <th>Tipo</th>
                <th>Descripción</th>
                <th>Equipos</th>
                <th>Acciones</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="l : ${entry.value}">

                <td th:text="${l.leagueName}">Nombre</td>

                <td>
                    <span th:if="${l.international}">🌍 INTERNACIONAL (Prioridad)</span>
                    <span th:unless="${l.international}">📍 Regional</span>
                </td>

                <td th:text="${l.leagueDescription}">Descripción</td>

                <td th:text="${l.teams.size()}">0</td>

                <td>
                    <a th:href="@{/league/update/{id}(id=${l.leagueId})}" class="btn btn-sm btn-warning">Editar</a>
                    <a th:href="@{/league/delete/{id}(id=${l.leagueId})}" class="btn btn-sm btn-danger">Borrar</a>
                </td>
            </tr>
            </tbody>
        </table>

        <br> </div>

    <p th:if="${leaguesByGame.isEmpty()}">No hay ligas creadas todavía.</p>
</div>

</body>
</html>
