<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Equipos | GamePedia</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<div th:replace="~{templateFragments/navBar :: menuComun}"></div>

<div class="container mt-5 mb-5">

    <h2 class="fw-bold text-center mb-5">
        <i class="bi bi-shield-fill me-2 text-primary"></i>Equipos
    </h2>

    <!-- Agrupado por juego -->
    <div th:each="entry : ${teamsByTrophies}" class="mb-5">

        <div class="d-flex align-items-center mb-3 border-bottom pb-2">
            <h3 class="mb-0">
                <i class="bi bi-controller me-2 text-primary"></i>
                <span th:text="${entry.key.gameName}">GAME NAME</span>
            </h3>
        </div>

        <div class="row row-cols-3 g-4">
            <div th:each="team : ${entry.value}">
                <div class="card team-card-hover overflow-hidden"
                     style="position:relative; cursor:pointer;">

                    <!-- Logo -->
                    <div class="text-center" style="padding:1.5rem 1rem 1rem; background:var(--bg-surface);">
                        <img th:src="${team.imageUrl != null && !team.imageUrl.isEmpty()
                           ? team.imageUrl
                           : 'https://placehold.co/200x200/0d1117/00d4ff?text=Logo'}"
                             style="max-height:110px; width:auto; max-width:100%; object-fit:contain; margin:0 auto;"
                             th:alt="${team.teamName}">
                    </div>

                    <!-- Info -->
                    <div class="card-body text-center border-top" style="padding:1rem;">
                        <h5 class="fw-bold mb-1" style="color:var(--text-primary);"
                            th:text="${team.teamName}">Nombre Equipo</h5>

                        <div style="margin-top:0.5rem;">
              <span class="badge bg-warning">
                <i class="bi bi-trophy-fill me-1"></i>
                <span th:text="${team.trophies != null ? team.trophies : 0}">0</span>
              </span>
                        </div>
                    </div>

                    <a th:href="@{/teams/{id}(id=${team.teamId})}" class="stretched-link"></a>
                </div>
            </div>
        </div>

    </div>

    <div th:if="${teamsByTrophies.isEmpty()}" class="alert alert-info text-center">
        <i class="bi bi-info-circle me-2"></i>No hay equipos registrados actualmente.
    </div>

</div>

</body>
</html>
