<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Juegos | GamePedia</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/styles.css}">
</head>
<body>

<div th:replace="~{templateFragments/navBar :: menuComun}"></div>

<div class="container mt-5 mb-5">


    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2 class="fw-bold">
            <i class="bi bi-controller me-2"></i>Juegos
        </h2>

        <a sec:authorize="hasRole('ADMIN')"
           th:href="@{/admin/newGame}"
           class="btn btn-primary">
            <i class="bi bi-plus-lg me-1"></i>Nuevo Juego
        </a>
    </div>


    <div class="row row-cols-3 g-4">
        <div th:each="game : ${games}">
            <div class="card team-card-hover overflow-hidden" style="position:relative;">


                <div class="game-img-container" style="height:200px;">
                    <img th:src="${game.gameImageUrl != null && !game.gameImageUrl.isEmpty()
                         ? game.gameImageUrl
                         : 'https://images.unsplash.com/photo-1542751371-adc38448a05e?q=80&w=500&auto=format&fit=crop'}"
                         th:alt="${game.gameName}">
                </div>


                <div class="card-body text-center" style="padding:1rem;">
                    <h5 class="fw-bold text-uppercase mb-1" th:text="${game.gameName}">Nombre</h5>


                    <span th:if="${game.gameGenre != null}"
                          class="badge bg-primary mb-2"
                          th:text="${game.gameGenre}">MOBA</span>


                    <div th:if="${game.hasCompetitiveScene}">
                        <span class="badge bg-warning">
                            <i class="bi bi-trophy-fill me-1"></i>Escena Competitiva
                        </span>
                    </div>
                </div>


                <div sec:authorize="hasRole('ADMIN')"
                     class="card-footer d-flex justify-content-center"
                     style="gap:0.5rem; padding-bottom:1.25rem; position:relative; z-index:2;">
                    <a th:href="@{/admin/editGame/{id}(id=${game.gameId})}"
                       class="btn btn-dark btn-sm">
                        <i class="bi bi-pencil-square"></i>
                    </a>
                    <a th:href="@{/admin/deleteGame/{id}(id=${game.gameId})}"
                       class="btn btn-outline-danger btn-sm"
                       onclick="return confirm('¿Estás seguro de eliminar este juego?')">
                        <i class="bi bi-trash3"></i>
                    </a>
                </div>


                <a th:href="@{/games/{id}(id=${game.gameId})}" class="stretched-link"></a>
            </div>
        </div>
    </div>


    <div th:if="${#lists.isEmpty(games)}" class="alert alert-warning mt-5">
        <i class="bi bi-exclamation-triangle me-2"></i>No hay juegos guardados.
    </div>

</div>

<div th:replace="~{templateFragments/footer :: footer}"></div>
</body>
</html>
